      { name: 'Michael Ballard', years: [2019], pts: null, sundayAvg: null, ctps: 0, lds: 0, eagles: 0,

      { name: 'Obie Boykin', years: [2019], pts: null, sundayAvg: null, ctps: 0, lds: 0, eagles: 0,
        bestBB: null, bestScramble: null, notes: 'One-and-Doner (inaugural year)' },
    ];

    // Sort: multi-year players first (by pts desc), then one-year players
    players.sort(function (a, b) {
      var aMulti = a.years.length > 1 ? 1 : 0;
      var bMulti = b.years.length > 1 ? 1 : 0;
      if (aMulti !== bMulti) return bMulti - aMulti;
      var aPts = a.pts || 0;
      var bPts = b.pts || 0;
      return bPts - aPts;
    });

    function esc(s) { return PennNat.escapeHTML(s); }

    var grid = document.getElementById('player-grid');

    players.forEach(function (p) {
      var card = document.createElement('div');
      card.className = 'player-card';

      var yearsStr = p.years.join(', ');
      var ptsDisplay = p.pts != null ? p.pts : '—';
      var ppyrDisplay = p.ppyr != null ? p.ppyr.toFixed(2) : '—';
      var sundayDisplay = p.sundayAvg != null ? p.sundayAvg.toFixed(1) : '—';

      var detailRows = '';
      if (p.bestBB) detailRows += '<div class="player-stat" style="grid-column:1/-1"><span class="player-stat-label">Best Better Ball</span><span style="font-size:0.85rem;color:var(--off-white)">' + esc(p.bestBB) + '</span></div>';
      if (p.bestScramble) detailRows += '<div class="player-stat" style="grid-column:1/-1"><span class="player-stat-label">Best Scramble</span><span style="font-size:0.85rem;color:var(--off-white)">' + esc(p.bestScramble) + '</span></div>';
      if (p.eagles > 0) detailRows += '<div class="player-stat"><span class="player-stat-label">Eagles</span><span class="player-stat-value">' + p.eagles + '</span></div>';
      if (p.lds > 0) detailRows += '<div class="player-stat"><span class="player-stat-label">Long Drives</span><span class="player-stat-value">' + p.lds + '</span></div>';
      if (p.notes) detailRows += '<div class="player-stat" style="grid-column:1/-1"><span class="player-stat-label">Notable</span><span style="font-size:0.85rem;color:var(--gold)">' + esc(p.notes) + '</span></div>';

      var hasDetail = detailRows.length > 0;

      card.innerHTML =
        '<div class="player-card-header">' +
          '<span class="player-card-name">' + esc(p.name) + '</span>' +
          '<span class="player-card-years">' + p.years.length + ' yr' + (p.years.length > 1 ? 's' : '') + '</span>' +
        '</div>' +
        '<div class="player-card-stats">' +
          '<div class="player-stat"><span class="player-stat-label">Total Points</span><span class="player-stat-value">' + ptsDisplay + '</span></div>' +
          '<div class="player-stat"><span class="player-stat-label">Pts/Year</span><span class="player-stat-value">' + ppyrDisplay + '</span></div>' +
          '<div class="player-stat"><span class="player-stat-label">Sunday Avg</span><span class="player-stat-value">' + sundayDisplay + '</span></div>' +
          '<div class="player-stat"><span class="player-stat-label">CTPs</span><span class="player-stat-value">' + p.ctps + '</span></div>' +
        '</div>' +
        (hasDetail
          ? '<div class="player-card-detail"><div class="player-card-stats">' + detailRows + '</div></div>' +
            '<button class="player-card-toggle" onclick="this.parentElement.classList.toggle(\'expanded\');this.textContent=this.parentElement.classList.contains(\'expanded\')?\'Hide Details\':\'Show Details\'">Show Details</button>'
          : '') +
        '<div style="padding:0.5rem 1.25rem 0.75rem;font-size:0.75rem;color:var(--gray)">' + yearsStr + '</div>';

      grid.appendChild(card);
    });
